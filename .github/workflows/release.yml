name: Release

on:
  push:
    tags:
      - "v0.0.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: deepdaddyttv/bambuview

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Compute release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.3

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Prepare Docker Hub credentials
        id: dockerhub_login_prep
        run: |
          echo "username=$(printf '%s' "${{ secrets.DOCKERHUB_USERNAME }}" | tr -d '\r\n')" >> "$GITHUB_OUTPUT"
          echo "token=$(printf '%s' "${{ secrets.DOCKERHUB_TOKEN }}" | tr -d '\r\n')" >> "$GITHUB_OUTPUT"

      - name: Configure Docker Hub auth
        env:
          DOCKERHUB_USERNAME: ${{ steps.dockerhub_login_prep.outputs.username }}
          DOCKERHUB_TOKEN: ${{ steps.dockerhub_login_prep.outputs.token }}
        run: |
          mkdir -p "$HOME/.docker"
          AUTH=$(printf '%s:%s' "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" | base64 | tr -d '\r\n')
          cat > "$HOME/.docker/config.json" <<EOF
          {
            "auths": {
              "https://index.docker.io/v1/": {
                "auth": "$AUTH"
              },
              "registry-1.docker.io": {
                "auth": "$AUTH"
              }
            }
          }
          EOF

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
