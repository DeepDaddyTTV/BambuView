name: Release

on:
  push:
    tags:
      - "v0.0.*"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: deepdaddyttv/bambuview
      GHCR_IMAGE: ghcr.io/deepdaddyttv/bambuview

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Compute release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.3

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Prepare Docker Hub credentials
        id: dockerhub_login_prep
        env:
          RAW_DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          RAW_DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "username=$(printf '%s' "${RAW_DOCKERHUB_USERNAME}" | tr -d '\r\n')" >> "$GITHUB_OUTPUT"
          echo "token=$(printf '%s' "${RAW_DOCKERHUB_TOKEN}" | tr -d '\r\n')" >> "$GITHUB_OUTPUT"

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Copy image to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ steps.dockerhub_login_prep.outputs.username }}
          DOCKERHUB_TOKEN: ${{ steps.dockerhub_login_prep.outputs.token }}
        run: |
          echo "${DOCKERHUB_TOKEN}" | crane auth login index.docker.io -u "${DOCKERHUB_USERNAME}" --password-stdin
          crane copy \
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.value }} \
            index.docker.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}
          crane copy \
            ${{ env.GHCR_IMAGE }}:latest \
            index.docker.io/${{ env.IMAGE_NAME }}:latest

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
