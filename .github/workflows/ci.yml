name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.3

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: deepdaddyttv/bambuview:ci

      - name: Smoke test container image
        run: |
          docker run -d --rm \
            --name bambuview-ci \
            -p 4173:4173 \
            -e APP_ORIGIN=http://127.0.0.1:4173 \
            -e COOKIE_SECURE=false \
            deepdaddyttv/bambuview:ci

          for attempt in $(seq 1 30); do
            if curl -fsSL http://127.0.0.1:4173/api/health; then
              exit 0
            fi
            sleep 2
          done

          docker logs bambuview-ci
          exit 1

      - name: Stop smoke test container
        if: ${{ always() }}
        run: docker rm -f bambuview-ci || true
